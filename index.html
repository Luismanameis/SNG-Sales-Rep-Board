<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SNG COMMAND CENTER | 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020408;
            --glass: rgba(15, 23, 42, 0.7);
            --neon-blue: #00f2ff;
            --neon-green: #00ffa3;
            --neon-red: #ff3366;
        }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 255, 163, 0.05) 0%, transparent 40%);
            color: #e2e8f0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding-top: 140px; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .command-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10000;
            background: rgba(2, 4, 8, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 242, 255, 0.3);
            padding: env(safe-area-inset-top) 0 15px 0;
        }

        .command-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
        }

        @media (min-width: 768px) {
            .command-content { flex-direction: row; justify-content: space-between; }
        }

        .brand-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 3px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .global-stats {
            display: flex;
            gap: 20px;
        }

        .stat-pillar { text-align: center; }
        .stat-pillar label { display: block; font-size: 8px; color: var(--neon-blue); text-transform: uppercase; letter-spacing: 1px; }
        .stat-pillar span { font-family: 'Orbitron'; font-size: 0.9rem; }

        .grid-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            padding: 15px;
        }

        @media (min-width: 768px) {
            .grid-container { grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); }
        }

        .card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            position: relative;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .rep-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .rep-info h2 {
            font-family: 'Orbitron';
            font-size: 1.4rem;
            margin: 0;
        }

        .status-tag {
            font-size: 9px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 50px;
            background: rgba(0, 255, 163, 0.1);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
        }

        .revenue-display {
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 242, 255, 0.1);
        }

        .timer-val {
            font-family: 'Orbitron';
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        .hud-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .hud-item {
            background: rgba(255,255,255,0.03);
            padding: 12px 5px;
            border-radius: 12px;
            text-align: center;
        }

        .hud-item label { font-size: 8px; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .hud-item b { font-size: 0.85rem; color: #f8fafc; font-family: 'Orbitron'; }

        .card-ticker {
            margin-top: 20px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 9px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            color: #94a3b8;
        }

        @media (min-width: 400px) {
            .card-ticker { flex-direction: row; justify-content: space-between; }
        }

        .best-label { color: var(--neon-green); }
        .worst-label { color: var(--neon-red); }
    </style>
</head>
<body>

    <nav class="command-bar">
        <div class="command-content">
            <div class="brand-logo">SNG COMMAND</div>
            <div class="global-stats">
                <div class="stat-pillar"><label>Aggregated Units</label><span id="totalUnits">26,183</span></div>
                <div class="stat-pillar"><label>Global Cust</label><span id="totalCust" style="color: var(--neon-blue);">3,467</span></div>
            </div>
        </div>
    </nav>

    <div class="grid-container" id="leaderboard"></div>

    <script>
        const reps = [
            { name: "Mary", rev: 73061254, units: 8390, cust: 1038, status: "ELITE", best: "FEB: ₦20.5M", worst: "MAY: ₦4.99M" },
            { name: "Bolu", rev: 44820223, units: 4154, cust: 542, status: "PRO", best: "FEB: ₦11.1M", worst: "MAY: ₦3.9M" },
            { name: "Susan", rev: 17885292, units: 2089, cust: 322, status: "STEADY", best: "JAN: ₦4.9M", worst: "MAY: ₦1.6M" },
            { name: "Jaya", rev: 19844090, units: 1845, cust: 287, status: "STEADY", best: "JAN: ₦5.3M", worst: "MAY: ₦2.5M" },
            { name: "Rachel", rev: 17007461, units: 1814, cust: 311, status: "ACTIVE", best: "MAR: ₦4.3M", worst: "FEB: ₦2.0M" },
            { name: "Lewa", rev: 15780600, units: 2130, cust: 226, status: "ACTIVE", best: "APR: ₦3.8M", worst: "MAY: ₦1.3M" },
            { name: "Divine", rev: 14066800, units: 1927, cust: 277, status: "ACTIVE", best: "JAN: ₦3.4M", worst: "MAY: ₦1.4M" },
            { name: "Direct Log", rev: 5030200, units: 630, cust: 88, status: "CORE", best: "JAN: ₦1.8M", worst: "MAY: ₦375k" },
            { name: "Chiwendu", rev: 0, units: 0, cust: 0, status: "NEW", best: "N/A", worst: "N/A" }
        ];

        function init() {
            const grid = document.getElementById('leaderboard');
            grid.innerHTML = '';
            reps.sort((a,b) => b.rev - a.rev).forEach((rep, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="rep-header">
                        <div class="rep-info">
                            <span style="color: var(--neon-blue); font-size: 8px; font-weight: 700;">#0${i+1} RANKING</span>
                            <h2>${rep.name}</h2>
                        </div>
                        <span class="status-tag">${rep.status}</span>
                    </div>
                    <div class="revenue-display">
                        <label style="font-size: 9px; color: #64748b; text-transform: uppercase; margin-bottom: 5px; display: block;">Total Revenue (YTD)</label>
                        <div class="timer-val" id="timer-${rep.name.replace(/\s+/g, '')}">₦0</div>
                    </div>
                    <div class="hud-row">
                        <div class="hud-item"><label>Units</label><b>${rep.units.toLocaleString()}</b></div>
                        <div class="hud-item"><label>Customers</label><b>${rep.cust.toLocaleString()}</b></div>
                        <div class="hud-item"><label>LTV Avg</label><b>₦${rep.cust > 0 ? Math.floor(rep.rev/rep.cust).toLocaleString() : 0}</b></div>
                    </div>
                    <div class="card-ticker">
                        <span><b class="best-label">PEAK:</b> ${rep.best}</span>
                        <span><b class="worst-label">LOW:</b> ${rep.worst}</span>
                    </div>
                `;
                grid.appendChild(card);
                animate(rep.name.replace(/\s+/g, ''), rep.rev);
            });
        }

        function animate(name, target) {
            const el = document.getElementById(`timer-${name}`);
            if(!el) return;
            let current = 0;
            const step = target / 60; 

            const update = () => {
                if (current < target) {
                    current += step;
                    el.innerText = "₦" + Math.floor(current).toLocaleString();
                    requestAnimationFrame(update);
                } else {
                    el.innerText = "₦" + target.toLocaleString();
                    setTimeout(() => { current = 0; update(); }, 15000);
                }
            };
            update();
        }
        window.onload = init;
    </script>
</body>
</html>
