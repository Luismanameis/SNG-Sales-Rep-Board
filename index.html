<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNG ELITE LEADERBOARD V17</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesque:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --card: #0a0f1a;
            --accent: #00f2ff;
            --success: #00ffa3;
            --danger: #ff3366;
            --gold: #f59e0b;
        }

        body {
            background: var(--bg);
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-top: 160px; /* Offset for fixed header */
        }

        /* --- FIXED HUB HEADER --- */
        .fixed-hub {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(3, 5, 8, 0.98);
            backdrop-filter: blur(20px);
            z-index: 10000;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }

        .header-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
        }

        .header-main h1 {
            font-family: 'Space Grotesque';
            font-size: 1.5rem;
            color: var(--accent);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .system-kpis {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 0 40px 10px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .kpi-item {
            text-align: center;
            border-left: 1px solid rgba(255,255,255,0.1);
        }

        .kpi-item label { display: block; font-size: 9px; color: #94a3b8; text-transform: uppercase; }
        .kpi-item span { font-family: 'Space Grotesque'; font-weight: 700; color: #fff; font-size: 1.1rem; }

        /* --- LEADERBOARD GRID --- */
        .leaderboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 25px;
        }

        .rep-card {
            background: var(--card);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            transition: all 0.3s ease;
        }

        .rep-card:hover {
            border-color: var(--accent);
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.1);
        }

        .rank-badge {
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--accent);
            color: #000;
            font-family: 'Space Grotesque';
            font-weight: 900;
            padding: 5px 15px;
            border-radius: 8px;
            font-size: 12px;
        }

        .rep-name {
            font-family: 'Space Grotesque';
            font-size: 1.6rem;
            margin: 10px 0 5px;
            color: #fff;
        }

        /* --- TIMER ELEMENT --- */
        .revenue-timer-box {
            background: rgba(0, 242, 255, 0.03);
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            margin: 15px 0;
            text-align: center;
        }

        .timer-label { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        
        .timer-value {
            font-family: 'Space Grotesque';
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            display: block;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .mini-stat {
            background: rgba(255,255,255,0.02);
            padding: 12px;
            border-radius: 12px;
        }

        .mini-stat label { font-size: 9px; color: #64748b; display: block; text-transform: uppercase; }
        .mini-stat span { font-weight: 700; font-size: 14px; }

        .highlights {
            margin-top: 20px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
        }

        .high-pill { padding: 4px 10px; border-radius: 4px; }
        .high-pill.best { background: rgba(0, 255, 163, 0.1); color: var(--success); }
        .high-pill.worst { background: rgba(255, 51, 102, 0.1); color: var(--danger); }
    </style>
</head>
<body>

    <div class="fixed-hub">
        <div class="header-main">
            <h1>SNG ELITE HUB 2026</h1>
            <div style="font-size: 12px; font-weight: 700; color: var(--success)">MAY STATUS: LIVE DATA</div>
        </div>
        <div class="system-kpis">
            <div class="kpi-item"><label>Total Rev MTD</label><span>₦12,951,900</span></div>
            <div class="kpi-item"><label>Total Units</label><span>1,404</span></div>
            <div class="kpi-item"><label>Active Reps</label><span>8</span></div>
            <div class="kpi-item"><label>Market Share</label><span>Lagos 49%</span></div>
        </div>
    </div>

    <div class="leaderboard-container" id="leaderboard">
        <!-- Cards generated by JS for better logic handling -->
    </div>

<script>
    const salesData = [
        { name: "Mary", totalRev: 72050254, units: 8255, cust: 1024, bestMonth: "Feb (₦20.4M)", worstMonth: "May (₦3.9M)" },
        { name: "Bolu", totalRev: 43972823, units: 4236, cust: 523, bestMonth: "Feb (₦11.1M)", worstMonth: "May (₦3.0M)" },
        { name: "Jaya", totalRev: 18372590, units: 1781, cust: 277, bestMonth: "Jan (₦5.3M)", worstMonth: "May (₦1.0M)" },
        { name: "Susan", totalRev: 17464892, units: 2028, cust: 282, bestMonth: "Jan (₦4.9M)", worstMonth: "May (₦1.1M)" },
        { name: "Lewa", totalRev: 15182200, units: 1932, cust: 217, bestMonth: "Apr (₦3.8M)", worstMonth: "May (₦774k)" },
        { name: "Rachel", totalRev: 15091111, units: 1648, cust: 266, bestMonth: "Mar (₦4.3M)", worstMonth: "May (₦1.6M)" },
        { name: "Divine", totalRev: 13490200, units: 1847, cust: 268, bestMonth: "Jan (₦3.4M)", worstMonth: "May (₦958k)" },
        { name: "Chiwendu", totalRev: 0, units: 0, cust: 0, bestMonth: "N/A", worstMonth: "N/A" },
        { name: "Direct Log", totalRev: 4895800, units: 606, cust: 87, bestMonth: "Jan (₦1.8M)", worstMonth: "May (₦241k)" }
    ];

    function createCards() {
        const container = document.getElementById('leaderboard');
        salesData.sort((a, b) => b.totalRev - a.totalRev).forEach((rep, index) => {
            const card = document.createElement('div');
            card.className = 'rep-card';
            card.innerHTML = `
                <div class="rank-badge">#${index + 1}</div>
                <div class="rep-name">${rep.name}</div>
                <div class="revenue-timer-box">
                    <span class="timer-label">Total 2026 Revenue</span>
                    <span class="timer-value" id="rev-${rep.name}">₦0</span>
                </div>
                <div class="stat-grid">
                    <div class="mini-stat"><label>Customers</label><span>${rep.cust.toLocaleString()}</span></div>
                    <div class="mini-stat"><label>Units Sold</label><span>${rep.units.toLocaleString()}</span></div>
                </div>
                <div class="highlights">
                    <div class="high-pill best"><b>BEST:</b> ${rep.bestMonth}</div>
                    <div class="high-pill worst"><b>LOW:</b> ${rep.worstMonth}</div>
                </div>
            `;
            container.appendChild(card);
            animateRevenue(rep.name, rep.totalRev);
        });
    }

    function animateRevenue(id, target) {
        const el = document.getElementById(`rev-${id}`);
        let current = 0;
        const step = target / 100;

        const run = () => {
            if (current < target) {
                current += step;
                el.innerText = "₦" + Math.floor(current).toLocaleString();
                requestAnimationFrame(run);
            } else {
                el.innerText = "₦" + target.toLocaleString();
                // HOLD FOR 3 SECONDS THEN RESTART
                setTimeout(() => {
                    current = 0;
                    run();
                }, 3000);
            }
        };
        run();
    }

    window.onload = createCards;
</script>

</body>
</html>
