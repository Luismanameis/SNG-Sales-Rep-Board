<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SNG COMMAND CENTER | 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020408;
            --glass: rgba(15, 23, 42, 0.7);
            --neon-blue: #00f2ff;
            --neon-green: #00ffa3;
            --neon-red: #ff3366;
        }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 255, 163, 0.05) 0%, transparent 40%);
            color: #e2e8f0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding-top: 140px; /* Adjusted for mobile header height */
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- MOBILE OPTIMIZED HEADER --- */
        .command-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10000;
            background: rgba(2, 4, 8, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 242, 255, 0.3);
            padding: env(safe-area-inset-top) 0 15px 0;
        }

        .command-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column; /* Stack on mobile */
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
        }

        @media (min-width: 768px) {
            .command-content { flex-direction: row; justify-content: space-between; }
        }

        .brand-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 3px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .global-stats {
            display: flex;
            gap: 20px;
        }

        .stat-pillar { text-align: center; }
        .stat-pillar label { display: block; font-size: 8px; color: var(--neon-blue); text-transform: uppercase; letter-spacing: 1px; }
        .stat-pillar span { font-family: 'Orbitron'; font-size: 0.9rem; }

        /* --- RESPONSIVE GRID --- */
        .grid-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr; /* Default 1 col for mobile */
            gap: 20px;
            padding: 15px;
        }

        @media (min-width: 768px) {
            .grid-container { grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); }
        }

        .card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            position: relative;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); /* Safari support */
        }

        .rep-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .rep-info h2 {
            font-family: 'Orbitron';
            font-size: 1.4rem;
            margin: 0;
        }

        .status-tag {
            font-size: 9px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 50px;
            background: rgba(0, 255, 163, 0.1);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
        }

        .revenue-display {
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .timer-val {
            font-family: 'Orbitron';
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
        }

        .hud-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .hud-item {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 12px;
        }

        .hud-item label { font-size: 9px; color: #64748b; text-transform: uppercase; display: block; }
        .hud-item b { font-size: 0.9rem; color: #f8fafc; }

        .card-ticker {
            margin-top: 20px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 9px;
            display: flex;
            flex-direction: column; /* Stack on very small screens */
            gap: 5px;
            color: #94a3b8;
        }

        @media (min-width: 400px) {
            .card-ticker { flex-direction: row; justify-content: space-between; }
        }

        .best-label { color: var(--neon-green); }
        .worst-label { color: var(--neon-red); }
    </style>
</head>
<body>

    <nav class="command-bar">
        <div class="command-content">
            <div class="brand-logo">SNG COMMAND</div>
            <div class="global-stats">
                <div class="stat-pillar"><label>Units</label><span>22,333</span></div>
                <div class="stat-pillar"><label>Group Rev</label><span style="color: var(--neon-green);">₦200.5M</span></div>
            </div>
        </div>
    </nav>

    <div class="grid-container" id="leaderboard"></div>

    <script>
        const reps = [
            { name: "Mary", rev: 72050254, units: 8255, status: "ELITE", best: "FEB: ₦20.5M", worst: "MAY: ₦3.9M" },
            { name: "Bolu", rev: 43972823, units: 4236, status: "PRO", best: "FEB: ₦11.1M", worst: "MAY: ₦3.0M" },
            { name: "Jaya", rev: 18372590, units: 1781, status: "STEADY", best: "JAN: ₦5.3M", worst: "MAY: ₦1.0M" },
            { name: "Susan", rev: 17464892, units: 2028, status: "RISING", best: "JAN: ₦4.9M", worst: "MAY: ₦1.1M" },
            { name: "Lewa", rev: 15182200, units: 1932, status: "ACTIVE", best: "APR: ₦3.8M", worst: "MAY: ₦774k" },
            { name: "Rachel", rev: 15091111, units: 1648, status: "ACTIVE", best: "MAR: ₦4.3M", worst: "MAY: ₦1.6M" },
            { name: "Divine", rev: 13490200, units: 1847, status: "ACTIVE", best: "JAN: ₦3.4M", worst: "MAY: ₦958k" },
            { name: "Chiwendu", rev: 0, units: 0, status: "NEW", best: "N/A", worst: "N/A" }
        ];

        function init() {
            const grid = document.getElementById('leaderboard');
            reps.sort((a,b) => b.rev - a.rev).forEach((rep, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="rep-header">
                        <div class="rep-info">
                            <span style="color: var(--neon-blue); font-size: 8px; font-weight: 700;">#0${i+1} RANKING</span>
                            <h2>${rep.name}</h2>
                        </div>
                        <span class="status-tag">${rep.status}</span>
                    </div>
                    <div class="revenue-display">
                        <div class="timer-val" id="timer-${rep.name}">₦0</div>
                    </div>
                    <div class="hud-row">
                        <div class="hud-item"><label>Volume</label><b>${rep.units.toLocaleString()} Units</b></div>
                        <div class="hud-item"><label>Status</label><b>Operational</b></div>
                    </div>
                    <div class="card-ticker">
                        <span><b class="best-label">PEAK:</b> ${rep.best}</span>
                        <span><b class="worst-label">LOW:</b> ${rep.worst}</span>
                    </div>
                `;
                grid.appendChild(card);
                animate(rep.name, rep.rev);
            });
        }

        function animate(name, target) {
            const el = document.getElementById(`timer-${name}`);
            let current = 0;
            const step = target / 50; // Faster for mobile responsiveness

            const update = () => {
                if (current < target) {
                    current += step;
                    el.innerText = "₦" + Math.floor(current).toLocaleString();
                    requestAnimationFrame(update);
                } else {
                    el.innerText = "₦" + target.toLocaleString();
                    setTimeout(() => { current = 0; update(); }, 4000);
                }
            };
            update();
        }
        window.onload = init;
    </script>
</body>
</html>
